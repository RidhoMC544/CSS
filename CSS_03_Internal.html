<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: red;
        }
        b{
            color: blue;
        }
        p{
            /* font - size */
            font-family:Arial, Helvetica, sans-serif;
        }
        i{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <!--Internal CSS
        style :
            -font family : tema tulisan
            -backround color : warna backround
     -->
    <h1>Hello World from CSS</h1>
    <p>
        Ini adalah percobaan
        pertama kita menggunakan <b>HTML</b> dengan <i>CSS</i>
    </p>
</body>
</html>
